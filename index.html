<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why not? Take a Chance With Me</title>

<style>
/* --- Full screen body with background transition --- */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: background-image 0.5s ease-in-out;
}

/* --- Card in the center --- */
.card {
    background: rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 350px;
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    z-index: 1;
}

/* --- Button container --- */
.btn-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 30px;
    position: relative; 
    height: 50px; /* Reserved space for buttons */
}

button {
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    font-size: 16px;
    transition: transform 0.2s;
}

#yesBtn { 
    background: #4CAF50; 
    color: white;
}

#noBtn {
    background: #f44336;
    color: white;
}

/* --- Lyrics centered and styled --- */
.lyrics {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px;
    font-weight: bold;
    text-align: center;
    opacity: 0;
    transition: opacity 0.8s;
    pointer-events: none;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div class="card" id="card">
    <h1>WHY NOT</h1>
    <h1>TAKE A CHANCE WITH ME?</h1>
    <div class="btn-container">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>
</div>

<div id="lyrics" class="lyrics"></div>

<audio id="bgMusic" src="download.mp4"></audio>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const card = document.getElementById("card");
const music = document.getElementById("bgMusic");
const lyricsDiv = document.getElementById("lyrics");

// --- Dodge button positions ---
const positions = [
    { x: 40, y: -30 },  
    { x: -40, y: 30 },  
    { x: 50, y: 20 },   
    { x: -50, y: -20 }, 
    { x: 0, y: -60 },   
    { x: 0, y: 60 }     
];
let lastIndex = -1;

const loopDodge = () => {
    if (noBtn.style.position !== "absolute") {
        noBtn.style.position = "absolute";
    }
    let newIndex;
    do {
        newIndex = Math.floor(Math.random() * positions.length);
    } while (newIndex === lastIndex);
    
    lastIndex = newIndex;
    const pos = positions[newIndex];
    noBtn.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
    noBtn.style.transition = "transform 0.1s ease-out"; 
};

// --- Trigger dodge ---
noBtn.addEventListener("mouseenter", loopDodge);
noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    loopDodge();
});

// --- Lyrics and background ---
const lyricsData = [
    { text: "Oh, why can't we for once", start: 0, end: 4, bg: "cutecat.jpeg" },
    { text: "Say what we want, say what we feel?", start: 4, end: 10, bg: "cutecat.jpeg" },
    { text: "Oh, why can't you for once", start: 10, end: 14, bg: "cutecat.jpeg" },
    { text: "Disregard the world, and run to what you know is real?", start: 14, end: 19, bg: "cutecat.jpeg" },
    { text: "Take a chance with me :)", start: 19, end: 999, bg: "cutecat.jpeg" }
];
let currentIndex = -1;

yesBtn.addEventListener("click", () => {
    card.style.display = "none";
    noBtn.style.display = "none"; 
    music.currentTime = 0;
    music.play().catch(e => console.log("Music play blocked: ", e));

    setInterval(() => {
        const currentTime = music.currentTime;
        const line = lyricsData.find(l => currentTime >= l.start && currentTime < l.end);

        if (line && lyricsData.indexOf(line) !== currentIndex) {
            currentIndex = lyricsData.indexOf(line);
            lyricsDiv.style.opacity = 0;

            setTimeout(() => {
                lyricsDiv.textContent = line.text;
                document.body.style.backgroundImage = `url('${line.bg}')`; // Fullscreen bg
                lyricsDiv.style.opacity = 1;
            }, 200);
        }
    }, 100);
});
</script>

</body>
</html>
